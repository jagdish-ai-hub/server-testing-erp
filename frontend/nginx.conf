# =============================================================================
# nginx.conf — Frontend container nginx configuration
# =============================================================================
#
# This config does two things:
#
# 1. API proxy: any request to /api/* is forwarded to the backend container
#    (hostname 'backend' resolves via Docker's internal DNS).
#    This means the browser only talks to one host — no CORS issues.
#
# 2. SPA routing: all other requests serve index.html so React Router can
#    handle client-side navigation. Without try_files, refreshing a page
#    like /dashboard would return a 404 from nginx.
#
# This file is copied into the image by the frontend Dockerfile and replaces
# nginx's default config at /etc/nginx/conf.d/default.conf.
# =============================================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy all /api/* requests to the backend container on port 5000.
    # Docker Compose networking makes 'backend' a resolvable hostname.
    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Serve the React SPA. Falls back to index.html for any unknown path
    # so client-side routes (React Router) work on page refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
